version = 1

[[annotations]]
path = [
    ".astro/*",
    ".editorconfig",
    ".github/**/*",
    ".gitignore",
    ".vscode/*",
    "CITATION.cff",
    "CNAME",
    "REUSE.toml",
    "astro.config.mjs",
    "data/members/*",
    "package-lock.json",
    "package.json",
    "public/.well-known/atproto-did",
    "public/robots.txt",
    "src/cache/jobSet.json",
    "src/env.d.ts",
    "tsconfig.json",
]
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
