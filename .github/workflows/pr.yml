name: Run checks on pull request

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run npm install
        run: npm install
      - name: Run checks
        run: npx astro check
      - name: Make OpenGraph image
        run: ./src/members/bin/makeOpenGraphImage.ts
